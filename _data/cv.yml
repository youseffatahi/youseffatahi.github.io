  name: Yousef Fatahi
  label: PhD in Pharmaceutical Nanotechnology
  email: youseffatahi@gmail.com
  location: Tarragona, Spain
  image: ""
  summary: >
    Researcher in pharmaceutical nanotechnology working on microneedle drug delivery,
    wearable interstitial-fluid biosensing, and stimuli-responsive nanocarriers, with a
    long-term focus on closed-loop sense-and-act theranostic platforms.

  social_networks:
    - network: GitHub
      username: yfatahi

  sections:
    Education:
      - institution: Tehran University of Medical Sciences (TUMS)
        location: Tehran, Iran
        url: https://en.tums.ac.ir/
        area: Pharmaceutical Nanotechnology
        studyType: PhD
        highlights:
          - Microneedle technologies for transdermal drug delivery and interstitial-fluid sampling.
          - Wearable microneedle electrochemical aptamer biosensors for continuous drug monitoring.

    Experience:
      - company: Institute of Chemical Research of Catalonia (ICIQ)
        position: Visiting Researcher
        location: Tarragona, Spain
        url: https://www.iciq.org/
        start_date: 2025-07
        highlights:
          - Research on responsive nanocarriers and microneedle-integrated delivery systems.

    Research Interests:
      - label: Microneedle technologies
        summary: Hydrogel-forming and swellable microneedles (MeHA, chitosan, GelMA), 3D-printed microcavity structures.
      - label: Continuous biosensing
        summary: Wearable microneedle electrochemical aptamer biosensors, ratiometric and KDM analysis for in vivo drift correction.
      - label: Responsive drug delivery
        summary: Stimuli-responsive nanocarriers, localized hydrogels, exosome and EV microneedle integration.
      - label: Closed-loop theranostics
        summary: AI-driven sense-and-act platforms that detect biomarkers or drug levels and actuate on-demand release.

    Profiles:
