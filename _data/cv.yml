  summary: >
    Researcher in Pharmaceutical Nanotechnology with a strong foundation in biomaterials
    and advanced therapeutic delivery systems. Doctoral research at ICIQ engineers
    minimally invasive, microneedle-based electrochemical aptasensors for continuous drug
    monitoring, with the long-term goal of autonomous, AI-driven closed-loop theranostic
    systems that diagnose and adjust therapy in real time.
